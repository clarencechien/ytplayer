<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px/1.5 system-ui, sans-serif; width: 360px; margin: 0; padding: 12px; background: #1c1c1e; color: #eee; }
    h1 { font-size: 14px; margin: 0 0 4px; }
    .muted { color: #999; }
    .tier { display: inline-block; padding: 1px 8px; border-radius: 10px; font-weight: 600; margin: 6px 0; }
    .tier-1 { background: #2d5; color: #000; }
    .tier-2 { background: #59f; color: #000; }
    .tier-3 { background: #fa3; color: #000; }
    .tier-4 { background: #e55; color: #000; }
    .hint { background: #2a2a2e; border-radius: 6px; padding: 8px; margin: 8px 0; }
    .warn { color: #fa3; }
    .err { color: #f66; }
    .ok { color: #2d5; }
    label.cap { display: block; padding: 6px 8px; border: 1px solid #444; border-radius: 6px; margin: 4px 0; cursor: pointer; }
    label.cap.disabled { opacity: 0.5; cursor: not-allowed; }
    button { width: 100%; padding: 8px; margin-top: 8px; border: 0; border-radius: 6px; background: #59f; color: #000; font-weight: 700; cursor: pointer; }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    #result { margin-top: 8px; white-space: pre-wrap; word-break: break-all; }
    #settings { margin-top: 10px; border-top: 1px solid #333; padding-top: 6px; color: #999; }
    #settings label { display: block; margin: 6px 0 2px; }
    #settings input { width: 100%; box-sizing: border-box; background: #2a2a2e; color: #eee; border: 1px solid #444; border-radius: 4px; padding: 4px 6px; }
    #settings button { margin-top: 6px; }
  </style>
</head>
<body>
  <h1>ytplayer ingest</h1>
  <div id="app" class="muted">讀取中…</div>
  <div id="result"></div>
  <details id="settings">
    <summary>⚙ 設定</summary>
    <label>Worker URL <input id="cfg-url" placeholder="https://ytplayer.xxx.workers.dev"></label>
    <label>INGEST_KEY <input id="cfg-key" type="password" placeholder="與 Worker secret 一致"></label>
    <button id="cfg-save">儲存</button>
  </details>
  <script type="module" src="popup.js"></script>
</body>
</html>
